<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Senxit - FF Sensitivity & DPI Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            color: #eef2ff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #10182f, #06090f);
        }
        .auth-card {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .auth-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff, #7aa2f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .input-field {
            width: 100%;
            padding: 0.9rem 1rem;
            margin: 0.6rem 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }
        textarea.input-field {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            background: linear-gradient(95deg, #3b82f6, #2563eb);
            border: none;
            padding: 0.8rem;
            width: 100%;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .btn-loading {
            background: #475569;
            cursor: wait;
            opacity: 0.7;
        }
        .switch-text {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.85rem;
        }
        .switch-blue {
            color: #60a5fa;
            cursor: pointer;
            font-weight: 600;
        }
        .taskbar {
            background: rgba(12, 18, 34, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 0.6rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(120deg, #f97316, #facc15);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-icons {
            display: flex;
            gap: 1.8rem;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            background: rgba(255,255,255,0.03);
            position: relative;
        }
        .nav-item i {
            font-size: 1.4rem;
            margin-bottom: 0.2rem;
        }
        .nav-item span {
            font-size: 0.7rem;
            font-weight: 500;
        }
        .nav-item.active {
            background: #3b82f6;
            color: white;
        }
        .notification-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background-color: #ef4444;
            border-radius: 50%;
            border: 2px solid #0a0f1e;
        }
        .logout-btn {
            background: #dc2626;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .panel {
            background: #0f1422e0;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid #2d3748;
        }
        .search-bar {
            width: 100%;
            padding: 0.8rem;
            border-radius: 2rem;
            background: #1e293b;
            border: none;
            color: white;
            margin-bottom: 1.5rem;
        }
        .mobile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }
        .mobile-card {
            background: #111827;
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid #2d3a5e;
            cursor: pointer;
            transition: 0.2s;
        }
        .mobile-card:hover {
            transform: scale(1.02);
            border-color: #3b82f6;
        }
        .sensi-row {
            display: flex;
            justify-content: space-between;
            margin: 0.4rem 0;
            font-size: 0.85rem;
        }
        .copy-btn {
            background: #2563eb;
            border: none;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            background: #0a0f1a;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin-bottom: 1rem;
            display: flex;
            width: 100%;
        }
        .message-user {
            justify-content: flex-end;
        }
        .message-admin {
            justify-content: flex-start;
        }
        .bubble {
            padding: 0.6rem 1rem;
            max-width: 70%;
            word-break: break-word;
            border-radius: 1.2rem;
        }
        .bubble-user {
            background: #2563eb;
            color: white;
            border-radius: 1.2rem 1.2rem 0 1.2rem;
        }
        .bubble-admin {
            background: #334155;
            color: #f1f5f9;
            border-radius: 1.2rem 1.2rem 1.2rem 0;
        }
        .user-list-item {
            background: #1e293b;
            margin: 0.5rem 0;
            padding: 0.8rem;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .admin-msg-input {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
            align-items: center;
        }
        .small-input {
            flex: 1;
            padding: 0.5rem;
            border-radius: 2rem;
            background: #0f172a;
            border: 1px solid #3b82f6;
            color: white;
        }
        .conversation-view {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        .back-btn {
            background: #475569;
            margin-bottom: 1rem;
            width: auto;
            padding: 0.4rem 1rem;
        }
        .inbox-item {
            background: #1e293b;
            margin: 0.5rem 0;
            padding: 0.8rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .inbox-item:hover {
            background: #2d3a5e;
        }
        .unread-badge {
            background: #ef4444;
            color: white;
            border-radius: 999px;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .sensi-item {
            background: #1e293b;
            margin: 0.5rem 0;
            padding: 0.8rem;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .tutorial-card {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .watch-btn {
            background: #f97316;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid #3b82f6;
        }
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }
        .file-card {
            background: #111827;
            border-radius: 1.5rem;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2d3a5e;
        }
        .file-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
        }
        .file-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #0f172a;
        }
        .file-info {
            padding: 1rem;
        }
        .file-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }
        .file-desc {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }
        .file-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }
        .file-modal-content {
            background: #0f172a;
            border-radius: 2rem;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
            padding: 1.5rem;
            position: relative;
        }
        .carousel-img {
            max-width: 100%;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 1rem;
        }
        .carousel-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
        }
        .download-file-btn {
            background: #10b981;
            margin-top: 0;
        }
        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 0.5rem;
        }
        .image-input-group {
            background: #1e293b;
            padding: 0.5rem;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
        }
        .file-input-group {
            background: #1e293b;
            padding: 0.5rem;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 700px) {
            .nav-icons { gap: 0.8rem; }
            .taskbar { flex-direction: column; gap: 0.8rem; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // STORAGE KEYS
    const STORAGE_USERS = "senxit_users";
    const STORAGE_SENSITIVITIES = "senxit_sensitivities";
    const STORAGE_TUTORIALS = "senxit_tutorials";
    const STORAGE_FILES = "senxit_files";

    let users = [];
    let sensitivities = {};
    let tutorials = [];
    let files = [];
    let currentUser = null;
    let currentPanel = "sensi";
    let adminSubPage = "addSensi";
    let adminChatTarget = null;

    function loadData() {
        const storedUsers = localStorage.getItem(STORAGE_USERS);
        if(storedUsers) users = JSON.parse(storedUsers);
        else {
            users = [
                { uid: "999", name: "ali hassan", level: "Admin", fullName: "ali hassan", createdAt: new Date().toISOString(), isAdmin: true, banned: false, messages: [], lastSeenMsg: Date.now() },
                { uid: "1001", name: "demoninja", level: "85", fullName: "Raza Khan", createdAt: new Date().toISOString(), isAdmin: false, banned: false, messages: [], lastSeenMsg: Date.now() }
            ];
            saveUsers();
        }

        const storedSensi = localStorage.getItem(STORAGE_SENSITIVITIES);
        if(storedSensi) sensitivities = JSON.parse(storedSensi);
        else {
            const sampleModels = {
                "iphone 14 pro max": { general: 95, scope2x: 82, scope4x: 78, sniper: 65, freeCamera: 90, dpi: 460, modelDisplay: "iPhone 14 Pro Max" },
                "iphone 13 pro": { general: 92, scope2x: 80, scope4x: 75, sniper: 62, freeCamera: 88, dpi: 460, modelDisplay: "iPhone 13 Pro" },
                "samsung s23 ultra": { general: 88, scope2x: 79, scope4x: 72, sniper: 60, freeCamera: 85, dpi: 490, modelDisplay: "Samsung S23 Ultra" },
                "xiaomi 13 pro": { general: 90, scope2x: 81, scope4x: 77, sniper: 64, freeCamera: 87, dpi: 440, modelDisplay: "Xiaomi 13 Pro" },
                "realme gt 2": { general: 86, scope2x: 77, scope4x: 71, sniper: 58, freeCamera: 83, dpi: 410, modelDisplay: "Realme GT 2" },
                "redmagic 8 pro": { general: 99, scope2x: 94, scope4x: 89, sniper: 80, freeCamera: 97, dpi: 500, modelDisplay: "RedMagic 8 Pro" },
                "nokia g60": { general: 72, scope2x: 65, scope4x: 60, sniper: 48, freeCamera: 70, dpi: 400, modelDisplay: "Nokia G60" }
            };
            for(let [key, val] of Object.entries(sampleModels)) sensitivities[key] = val;
            saveSensitivities();
        }

        const storedTuts = localStorage.getItem(STORAGE_TUTORIALS);
        if(storedTuts) tutorials = JSON.parse(storedTuts);
        else {
            tutorials = [
                { id: "1", title: "How to Master Free Fire Sensitivity", link: "https://www.youtube.com/watch?v=dQw4w9WgXcQ", createdAt: new Date().toISOString() }
            ];
            saveTutorials();
        }

        const storedFiles = localStorage.getItem(STORAGE_FILES);
        if(storedFiles) files = JSON.parse(storedFiles);
        else {
            files = [];
        }

        users.forEach(u => {
            if(!u.messages) u.messages = [];
            if(!u.lastSeenMsg) u.lastSeenMsg = Date.now();
            u.messages = u.messages.map(msg => {
                if(!msg.sender) {
                    return { text: msg.text, timestamp: msg.timestamp, sender: msg.isSystem ? 'admin' : 'user' };
                }
                return msg;
            });
        });
        saveUsers();
    }

    function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
    function saveSensitivities() { localStorage.setItem(STORAGE_SENSITIVITIES, JSON.stringify(sensitivities)); }
    function saveTutorials() { localStorage.setItem(STORAGE_TUTORIALS, JSON.stringify(tutorials)); }
    function saveFiles() { localStorage.setItem(STORAGE_FILES, JSON.stringify(files)); }

    function getUnreadCount(user) {
        if(!user.messages) return 0;
        return user.messages.filter(msg => new Date(msg.timestamp).getTime() > (user.lastSeenMsg || 0)).length;
    }
    function markMessagesRead(user) {
        user.lastSeenMsg = Date.now();
        saveUsers();
    }

    function sendAdminToUser(uid, messageText) {
        const user = users.find(u => u.uid === uid);
        if(!user || user.banned) return false;
        if(!user.messages) user.messages = [];
        user.messages.push({ text: messageText, timestamp: new Date().toISOString(), sender: 'admin' });
        saveUsers();
        return true;
    }
    function sendUserToAdmin(messageText) {
        if(!currentUser || currentUser.isAdmin) return false;
        const admin = users.find(u => u.uid === "999");
        if(admin) {
            if(!admin.messages) admin.messages = [];
            admin.messages.push({ text: messageText, timestamp: new Date().toISOString(), sender: currentUser.uid });
            saveUsers();
        }
        if(!currentUser.messages) currentUser.messages = [];
        currentUser.messages.push({ text: messageText, timestamp: new Date().toISOString(), sender: 'user' });
        saveUsers();
        return true;
    }

    function addSensitivity(modelName, general, scope2x, scope4x, sniper, freeCamera, dpi) {
        const key = modelName.toLowerCase();
        sensitivities[key] = { general, scope2x, scope4x, sniper, freeCamera, dpi, modelDisplay: modelName };
        saveSensitivities();
    }
    function updateSensitivity(oldKey, newModel, general, scope2x, scope4x, sniper, freeCamera, dpi) {
        delete sensitivities[oldKey];
        const newKey = newModel.toLowerCase();
        sensitivities[newKey] = { general, scope2x, scope4x, sniper, freeCamera, dpi, modelDisplay: newModel };
        saveSensitivities();
    }
    function deleteSensitivity(modelKey) {
        delete sensitivities[modelKey];
        saveSensitivities();
    }
    function getSensitivity(modelName) {
        return sensitivities[modelName.toLowerCase()] || null;
    }

    // Tutorial CRUD
    function addTutorial(title, link) {
        tutorials.push({ id: Date.now().toString(), title, link, createdAt: new Date().toISOString() });
        saveTutorials();
    }
    function updateTutorial(tutId, newTitle, newLink) {
        const index = tutorials.findIndex(t => t.id === tutId);
        if(index !== -1) {
            tutorials[index].title = newTitle;
            tutorials[index].link = newLink;
            saveTutorials();
        }
    }
    function deleteTutorial(tutId) {
        tutorials = tutorials.filter(t => t.id !== tutId);
        saveTutorials();
    }

    // File CRUD
    function addFile(title, description, images, fileData) {
        const newFile = { id: Date.now().toString(), title, description, images, fileData, createdAt: new Date().toISOString() };
        files.push(newFile);
        saveFiles();
    }
    function deleteFile(fileId) {
        files = files.filter(f => f.id !== fileId);
        saveFiles();
    }

    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // RENDER ENGINE
    function render() {
        const app = document.getElementById("app");
        if(!currentUser) {
            app.innerHTML = renderAuthScreen();
            attachAuthEvents();
        } else if(currentUser.isAdmin) {
            app.innerHTML = renderAdminPanel();
            attachAdminEvents();
        } else {
            app.innerHTML = renderUserPanel();
            attachUserEvents();
            if(currentPanel === "sensi") renderSensiTab();
            else if(currentPanel === "messages") renderMessagesTab();
            else if(currentPanel === "account") renderAccountTab();
            else if(currentPanel === "tutorial") renderTutorialTab();
            else if(currentPanel === "files") renderFilesTab();
        }
    }

    function renderAuthScreen() {
        return `
            <div class="auth-container">
                <div class="auth-card" id="authCard">
                    <h2 id="authTitle">🔐 Login to Senxit</h2>
                    <input type="text" id="uidInput" class="input-field" placeholder="Enter UID">
                    <button id="loginBtn" class="btn">Login</button>
                    <div class="switch-text">Doesn't have any account? <span id="showSignup" class="switch-blue">Create account</span></div>
                    <div id="authError" style="color:#f87171; margin-top:10px; text-align:center;"></div>
                </div>
            </div>
        `;
    }

    function attachAuthEvents() {
        let isSignupMode = false;
        const loginBtn = document.getElementById("loginBtn");
        const uidInput = document.getElementById("uidInput");
        const showSignup = document.getElementById("showSignup");

        function switchMode(signup) {
            isSignupMode = signup;
            const title = document.getElementById("authTitle");
            const btn = document.getElementById("loginBtn");
            const switchText = document.querySelector(".switch-text");
            if(signup) {
                title.innerText = "📝 Create Account";
                btn.innerText = "Create Account";
                switchText.innerHTML = `Already have account? <span id="showSignup" class="switch-blue">Login</span>`;
                if(!document.getElementById("signupExtra")) {
                    const extraDiv = document.createElement("div");
                    extraDiv.id = "signupExtra";
                    extraDiv.innerHTML = `
                        <input type="text" id="signupName" class="input-field" placeholder="ID Name (username)">
                        <input type="text" id="signupLevel" class="input-field" placeholder="Level">
                        <input type="text" id="signupFullName" class="input-field" placeholder="Your Full Name">
                    `;
                    const authCard = document.getElementById("authCard");
                    authCard.insertBefore(extraDiv, loginBtn);
                }
            } else {
                title.innerText = "🔐 Login to Senxit";
                btn.innerText = "Login";
                switchText.innerHTML = `Doesn't have any account? <span id="showSignup" class="switch-blue">Create account</span>`;
                const extra = document.getElementById("signupExtra");
                if(extra) extra.remove();
            }
            document.getElementById("showSignup")?.addEventListener("click", () => switchMode(!isSignupMode));
        }
        if(showSignup) showSignup.addEventListener("click", () => switchMode(true));

        loginBtn.onclick = async () => {
            loginBtn.classList.add("btn-loading");
            loginBtn.innerText = isSignupMode ? "Creating..." : "Logging...";
            await new Promise(r => setTimeout(r, 600));
            if(isSignupMode) {
                const uid = uidInput.value.trim();
                const idName = document.getElementById("signupName")?.value.trim();
                const level = document.getElementById("signupLevel")?.value.trim();
                const fullName = document.getElementById("signupFullName")?.value.trim();
                if(!uid || !idName || !level || !fullName) {
                    document.getElementById("authError").innerText = "All fields required!";
                    resetBtn();
                    return;
                }
                if(users.find(u => u.uid === uid)) {
                    document.getElementById("authError").innerText = "UID already exists!";
                    resetBtn();
                    return;
                }
                if(uid === "999") {
                    document.getElementById("authError").innerText = "Invalid UID";
                    resetBtn();
                    return;
                }
                const newUser = { uid, name: idName, level, fullName, createdAt: new Date().toISOString(), isAdmin: false, banned: false, messages: [], lastSeenMsg: Date.now() };
                users.push(newUser);
                saveUsers();
                alert("✅ Account created! Now login.");
                switchMode(false);
                uidInput.value = "";
                resetBtn();
            } else {
                const uid = uidInput.value.trim();
                const user = users.find(u => u.uid === uid && !u.banned);
                if(!user) {
                    document.getElementById("authError").innerHTML = "UID not correct or banned. <span id='createAccLink' class='switch-blue'>Create account</span>";
                    const link = document.getElementById("createAccLink");
                    if(link) link.onclick = () => switchMode(true);
                    resetBtn();
                    return;
                }
                if(user.uid === "999" && user.name === "ali hassan") {
                    currentUser = user;
                    render();
                } else if(!user.isAdmin) {
                    currentUser = user;
                    render();
                } else {
                    document.getElementById("authError").innerText = "Invalid admin credentials";
                    resetBtn();
                }
            }
            function resetBtn() {
                loginBtn.classList.remove("btn-loading");

    function showFileModal(file) {
        let currentImageIndex = 0;
        const modal = document.createElement("div");
        modal.className = "file-modal";
        modal.innerHTML = `
            <div class="file-modal-content">
                <button id="closeFileModal" style="position:absolute; top:10px; right:20px; background:red; border:none; color:white; padding:0.3rem 0.8rem; border-radius:2rem; cursor:pointer;">✕</button>
                <h3 style="margin-bottom:0.5rem;">${escapeHtml(file.title)}</h3>
                <p style="margin-bottom:1rem;">${escapeHtml(file.description)}</p>
                <div id="carouselContainer" style="text-align:center;">
                    <img id="carouselImg" class="carousel-img" src="${file.images[0]}" alt="file image">
                </div>
                <div class="carousel-nav">
                    <button id="prevImgBtn" class="copy-btn" ${file.images.length <= 1 ? 'disabled style="opacity:0.5;"' : ''}>◀ Prev</button>
                    <span id="imgCounter">1 / ${file.images.length}</span>
                    <button id="nextImgBtn" class="copy-btn" ${file.images.length <= 1 ? 'disabled style="opacity:0.5;"' : ''}>Next ▶</button>
                </div>
                <button id="downloadFileBtn" class="btn download-file-btn" style="margin-top:1rem;">📥 Download / Open</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = "flex";
        const imgElement = document.getElementById("carouselImg");
        const counterSpan = document.getElementById("imgCounter");
        const prevBtn = document.getElementById("prevImgBtn");
        const nextBtn = document.getElementById("nextImgBtn");

        function updateImage() {
            imgElement.src = file.images[currentImageIndex];
            counterSpan.innerText = `${currentImageIndex+1} / ${file.images.length}`;
            prevBtn.disabled = file.images.length <= 1;
            nextBtn.disabled = file.images.length <= 1;
        }
        prevBtn.onclick = () => {
            if(currentImageIndex > 0) {
                currentImageIndex--;
                updateImage();
            }
        };
        nextBtn.onclick = () => {
            if(currentImageIndex < file.images.length-1) {
                currentImageIndex++;
                updateImage();
            }
        };
        document.getElementById("closeFileModal").onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
        const downloadBtn = document.getElementById("downloadFileBtn");
        downloadBtn.onclick = async () => {
            downloadBtn.classList.add("btn-loading");
            downloadBtn.innerText = "Loading...";
            await new Promise(r => setTimeout(r, 800));
            if(file.fileData.type === 'url') {
                window.open(file.fileData.url, "_blank");
            } else {
                const a = document.createElement('a');
                a.href = file.fileData.base64;
                a.download = file.fileData.name || 'file';
                a.click();
            }
            downloadBtn.classList.remove("btn-loading");
            downloadBtn.innerText = "📥 Download / Open";
        };
    }

    function escapeHtml(str) {

            if(m === '<') return '&lt;';

            return m;
        });
    }

            document.querySelectorAll("[data-banuid]").forEach(btn => {
                btn.onclick = () => {
                    const uid = btn.dataset.banuid;
                    const user = users.find(u => u.uid === uid);
                    if(user) user.banned = !user.banned;
                    saveUsers();
                    render();
                };
            });
            document.querySelectorAll("[data-deluid]").forEach(btn => {
                btn.onclick = () => {
                    if(confirm("Delete user permanently?")) {
                        const uid = btn.dataset.deluid;
                        users = users.filter(u => u.uid !== uid);
                        saveUsers();
                        render();
                    }
                };
            });
        }
        else if(adminSubPage === "inbox") {
            container.innerHTML = renderInbox();
            const adminUser = users.find(u => u.uid === "999");
            if(adminUser) markMessagesRead(adminUser);
            if(!adminChatTarget) {
                document.querySelectorAll(".inbox-item").forEach(el => {
                    el.addEventListener("click", () => {
                        adminChatTarget = { uid: el.dataset.uid, name: el.dataset.name };
                        render();
                    });
                });
            } else {
                const user = users.find(u => u.uid === adminChatTarget.uid);
                const messages = user ? user.messages : [];
                const chatBox = document.getElementById("adminChatBox");
                if(chatBox) {
                    chatBox.innerHTML = messages.slice().reverse().map(msg => {
                        const isAdminMsg = msg.sender === 'admin';
                        return `
                            <div class="message ${isAdminMsg ? 'message-user' : 'message-admin'}">
                                <div class="bubble ${isAdminMsg ? 'bubble-user' : 'bubble-admin'}">
                                    ${msg.text}<br><span style="font-size:0.6rem;">${new Date(msg.timestamp).toLocaleString()}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
                document.getElementById("adminSendMsg")?.addEventListener("click", () => {
                    const input = document.getElementById("adminChatInput");
                    const msg = input.value.trim();
                    if(!msg) return;
                    sendAdminToUser(adminChatTarget.uid, msg);
                    input.value = "";
                    render();
                });
                document.getElementById("backToInbox")?.addEventListener("click", () => {
                    adminChatTarget = null;
                    render();
                });
            }
        }
        else if(adminSubPage === "addTutorial") {
            container.innerHTML = renderAddTutorial();
            document.getElementById("submitTutorialBtn")?.addEventListener("click", async () => {
                const title = document.getElementById("tutTitle").value.trim();
                const link = document.getElementById("tutLink").value.trim();
                if(!title || !link) {
                    document.getElementById("tutResult").innerHTML = "<span style='color:red'>Both fields required</span>";
                    return;
                }
                const btn = document.getElementById("submitTutorialBtn");
                btn.classList.add("btn-loading");
                btn.innerText = "Adding...";
                await new Promise(r => setTimeout(r, 800));
                addTutorial(title, link);
                btn.classList.remove("btn-loading");
                btn.innerText = "Add Tutorial";
                document.getElementById("tutResult").innerHTML = "<span style='color:green'>✅ Tutorial added!</span>";
                setTimeout(() => render(), 1000);
            });
        }
        else if(adminSubPage === "manageTutorials") {
            container.innerHTML = renderManageTutorials();
            // Edit tutorial
            document.querySelectorAll(".edit-tut").forEach(btn => {
                btn.addEventListener("click", () => {
                    const tutId = btn.dataset.tutid;
                    const tut = tutorials.find(t => t.id === tutId);
                    const modal = document.getElementById("editTutModal");
                    modal.style.display = "block";
                    modal.innerHTML = `
                        <h4>Edit Tutorial</h4>
                        <input type="text" id="editTutTitle" class="input-field" value="${escapeHtml(tut.title)}">
                        <input type="text" id="editTutLink" class="input-field" value="${escapeHtml(tut.link)}">
                        <button id="saveTutBtn" class="btn" data-tutid="${tutId}">Save Changes</button>
                        <button id="cancelTutBtn" class="btn" style="background:#475569;">Cancel</button>
                    `;
                    document.getElementById("saveTutBtn").onclick = () => {
                        const newTitle = document.getElementById("editTutTitle").value.trim();
                        const newLink = document.getElementById("editTutLink").value.trim();
                        if(!newTitle || !newLink) {
                            alert("Both fields required");
                            return;
                        }
                        updateTutorial(tutId, newTitle, newLink);
                        render();
                    };
                    document.getElementById("cancelTutBtn").onclick = () => { render(); };
                });
            });
            // Delete tutorial
            document.querySelectorAll(".delete-tut").forEach(btn => {
                btn.addEventListener("click", () => {
                    if(confirm("Delete this tutorial?")) {
                        deleteTutorial(btn.dataset.tutid);
                        render();
                    }
                });
            });
        }
        else if(adminSubPage === "addFile") {
            container.innerHTML = renderAddFile();
            let imageGroups = [];
            function addImageGroup(containerDiv) {
                const groupDiv = document.createElement("div");
                groupDiv.className = "image-input-group";
                groupDiv.innerHTML = `
                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                        <input type="file" accept="image/*" class="image-file-input" style="background:#1e293b; padding:0.5rem; border-radius:1rem; color:white;">
                        <input type="text" class="input-field img-url" placeholder="OR Image URL" style="flex:1;">
                        <button class="copy-btn remove-img" style="background:#dc2626;">Remove</button>
                    </div>
                    <div class="image-preview"></div>
                `;
                containerDiv.appendChild(groupDiv);
                const fileInput = groupDiv.querySelector(".image-file-input");
                const urlInput = groupDiv.querySelector(".img-url");
                const previewDiv = groupDiv.querySelector(".image-preview");
                const updatePreview = () => {
                    previewDiv.innerHTML = '';
                    if(urlInput.value.trim()) {
                        const img = document.createElement('img');
                        img.src = urlInput.value.trim();
                        img.className = "preview-img";
                        img.onerror = () => img.remove();
                        previewDiv.appendChild(img);
                    }
                };
                fileInput.onchange = async (e) => {
                    if(fileInput.files[0]) {
                        const base64 = await readFileAsBase64(fileInput.files[0]);
                        urlInput.value = base64;
                        updatePreview();
                    }
                };
                urlInput.oninput = updatePreview;
                groupDiv.querySelector(".remove-img").onclick = () => groupDiv.remove();
                return groupDiv;
            }
            const imagesContainer = document.getElementById("imagesContainer");
            addImageGroup(imagesContainer);
            document.getElementById("addMoreImages")?.addEventListener("click", () => {
                addImageGroup(imagesContainer);
            });
            document.getElementById("submitFileBtn")?.addEventListener("click", async () => {
                const title = document.getElementById("fileTitle").value.trim();
                const desc = document.getElementById("fileDesc").value.trim();
                const fileUpload = document.getElementById("fileUploadInput").files[0];
                const fileUrl = document.getElementById("fileUrlInput").value.trim();
                let fileData = null;
                if(fileUpload) {
                    const base64 = await readFileAsBase64(fileUpload);
                    fileData = { type: 'base64', base64: base64, name: fileUpload.name };
                } else if(fileUrl) {
                    fileData = { type: 'url', url: fileUrl };
                } else {
                    document.getElementById("fileResult").innerHTML = "<span style='color:red'>Please select a file from device OR enter a file URL</span>";
                    return;
                }
                const imageGroups = document.querySelectorAll("#imagesContainer .image-input-group");
                const images = [];
                for(let group of imageGroups) {
                    const urlInput = group.querySelector(".img-url");
                    if(urlInput && urlInput.value.trim()) {
                        images.push(urlInput.value.trim());
                    }
                }
                if(images.length === 0) {
                    document.getElementById("fileResult").innerHTML = "<span style='color:red'>At least one image required (upload or URL)</span>";
                    return;
                }
                if(!title || !desc) {
                    document.getElementById("fileResult").innerHTML = "<span style='color:red'>Title and description required</span>";
                    return;
                }
                const btn = document.getElementById("submitFileBtn");
                btn.classList.add("btn-loading");
                btn.innerText = "Adding...";
                await new Promise(r => setTimeout(r, 800));
                addFile(title, desc, images, fileData);
                btn.classList.remove("btn-loading");
                btn.innerText = "Add File";
                document.getElementById("fileResult").innerHTML = "<span style='color:green'>✅ File added successfully!</span>";
                setTimeout(() => render(), 1000);
            });
        }
        else if(adminSubPage === "manageFiles") {
            container.innerHTML = renderManageFiles();
            document.querySelectorAll(".delete-file").forEach(btn => {
                btn.addEventListener("click", () => {
                    if(confirm("Delete this file permanently?")) {
                        deleteFile(btn.dataset.fileid);
                        render();
                    }
                });
            });
        }
    }

    function attachSensiEditDeleteEvents() {
        document.querySelectorAll(".edit-sensi").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const key = btn.dataset.key;
                const sens = sensitivities[key];
                const modal = document.getElementById("editModal");
                modal.style.display = "block";
                modal.innerHTML = `
                    <h4>Edit ${sens.modelDisplay}</h4>
                    <input type="text" id="editModel" class="input-field" value="${sens.modelDisplay}">
                    <input type="number" id="editGen" class="input-field" value="${sens.general}">
                    <input type="number" id="edit2x" class="input-field" value="${sens.scope2x}">
                    <input type="number" id="edit4x" class="input-field" value="${sens.scope4x}">
                    <input type="number" id="editSniper" class="input-field" value="${sens.sniper}">
                    <input type="number" id="editFree" class="input-field" value="${sens.freeCamera}">
                    <input type="number" id="editDpi" class="input-field" value="${sens.dpi}">
                    <button id="saveEditBtn" class="btn" data-oldkey="${key}">Save Changes</button>
                    <button id="cancelEditBtn" class="btn" style="background:#475569;">Cancel</button>
                `;
                document.getElementById("saveEditBtn").onclick = () => {
                    const newModel = document.getElementById("editModel").value.trim();
                    const newGen = parseInt(document.getElementById("editGen").value);
                    const new2x = parseInt(document.getElementById("edit2x").value);
                    const new4x = parseInt(document.getElementById("edit4x").value);
                    const newSn = parseInt(document.getElementById("editSniper").value);
                    const newFree = parseInt(document.getElementById("editFree").value);
                    const newDpi = parseInt(document.getElementById("editDpi").value);
                    if(!newModel || isNaN(newGen) || isNaN(new2x) || isNaN(new4x) || isNaN(newSn) || isNaN(newFree) || isNaN(newDpi)) {
                        alert("Invalid values");
                        return;
                    }
                    updateSensitivity(key, newModel, newGen, new2x, new4x, newSn, newFree, newDpi);
                    render();
                };
                document.getElementById("cancelEditBtn").onclick = () => { render(); };
            });
        });
        document.querySelectorAll(".delete-sensi").forEach(btn => {
            btn.addEventListener("click", () => {
                if(confirm("Delete this sensitivity?")) {
                    deleteSensitivity(btn.dataset.key);
                    render();
                }
            });
        });
    }

    loadData();
    render();
</script>
</body>
</html>
